name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: tron
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Run all checks
        run: nix flake check --print-build-logs
